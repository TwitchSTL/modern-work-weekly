name: Build Hugo site

on:
  push:
    branches: [master]
    paths:
      - "site/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.128.0"
          extended: false

      - name: Build site
        run: |
          cd site
          hugo --minify --baseURL "https://modernworkweekly.com"

# Deploy is handled by a cron job on the LXC that pulls from GitHub every 5 minutes.
