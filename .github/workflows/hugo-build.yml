name: Build Hugo site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        run: |
          HUGO_VERSION="0.128.0"
          wget -q -O /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp
          sudo mv /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Build site
        run: |
          cd site
          hugo --minify --baseURL "https://modernworkweekly.com"

# Deploy is handled by a cron job on the LXC that pulls from GitHub every 5 minutes.
