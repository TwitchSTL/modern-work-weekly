<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.description }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">

  <!-- Open Graph for LinkedIn sharing -->
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">

  <!-- RSS -->
  {{ range .AlternativeOutputFormats -}}
  <link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink | safeURL }}" title="{{ $.Site.Title }}">
  {{ end -}}

  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/main.css?v={{ now.Unix }}">
</head>
<body>
  {{ partial "header.html" . }}
  <main class="{{ if or .IsHome (and .IsPage (in .File.Path "posts")) }}main-wide{{ else }}container{{ end }}">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}

  <!-- Search modal -->
  <div id="search-overlay" class="search-overlay" role="dialog" aria-modal="true" aria-label="Search articles">
    <div class="search-box">
      <div class="search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.099zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/></svg>
        <input id="search-input" class="search-input" type="search" placeholder="Search articles, topics, products…" autocomplete="off" spellcheck="false">
      </div>
      <div id="search-results" class="search-results"></div>
      <div class="search-hint">
        <span><kbd>↵</kbd> open result</span>
        <span><kbd>Esc</kbd> close</span>
        <span><kbd>/</kbd> or <kbd>Ctrl K</kbd> open from anywhere</span>
      </div>
    </div>
  </div>
  <script src="/js/search.js?v={{ now.Unix }}"></script>
</body>
</html>
