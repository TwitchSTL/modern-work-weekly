<header class="site-header">
  <div class="container header-inner">
    <a class="site-title" href="/">
      <img src="/images/banner.png" alt="Modern Work Weekly" class="site-logo">
    </a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
      {{ with .Site.Params.linkedin }}
      <a href="{{ . }}" target="_blank" rel="noopener" class="nav-external">LinkedIn ↗</a>
      {{ end }}
      {{ partial "admin-links.html" . }}
      <button class="search-btn" aria-label="Search articles">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.099zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/></svg>
        <span>Search</span>
        <kbd>/</kbd>
      </button>
    </nav>
  </div>
</header>
