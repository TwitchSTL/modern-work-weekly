<header class="site-header">
  <div class="container header-inner">
    <a class="site-title" href="/">
      <img src="/images/banner.png" alt="Modern Work Weekly" class="site-logo">
    </a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
      {{ with .Site.Params.linkedin }}
      <a href="{{ . }}" target="_blank" rel="noopener" class="nav-external">LinkedIn ↗</a>
      {{ end }}
      {{ partial "admin-links.html" . }}
    </nav>
  </div>
</header>
