<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-links">
      {{ with .Site.Params.linkedin }}
      <a href="{{ . }}" target="_blank" rel="noopener">LinkedIn ↗</a>
      {{ end }}
      {{ with .Site.Params.github }}
      <a href="{{ . }}" target="_blank" rel="noopener">GitHub ↗</a>
      {{ end }}
      <a href="/index.xml">RSS</a>
      <a href="/tags/">Topics</a>
    </div>
    <p class="footer-byline">Modern Work Weekly by {{ .Site.Params.author }}</p>
    <p class="footer-disclaimer">Independent digest. Not affiliated with Microsoft. Updates sourced from official Microsoft documentation portals.</p>
  </div>
</footer>
