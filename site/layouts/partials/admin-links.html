<div class="portals-dropdown" id="portals-dropdown">
  <button class="portals-toggle"
          onclick="togglePortals()"
          aria-expanded="false"
          aria-controls="portals-panel">
    Portals <span class="portals-caret">▾</span>
  </button>

  <div class="portals-panel" id="portals-panel" hidden>
    <div class="portals-grid">

      <!-- Admin Center — separate account recommended -->
      <div class="portals-group">
        <div class="portals-group-name">
          Admin Center
          <span class="portals-badge">separate account</span>
        </div>
        <div class="portals-buttons">
          <a class="portal-btn"
             href="https://admin.cloud.microsoft"
             target="_blank" rel="noopener">Chrome</a>
          <button class="portal-btn portal-btn-private"
                  onclick="adminLaunchPrivate('https://admin.cloud.microsoft','incognito')"
                  title="Copies URL — paste in Chrome Incognito (Ctrl+Shift+N)">Incognito</button>
          <a class="portal-btn"
             href="microsoft-edge:https://admin.cloud.microsoft">Edge</a>
          <button class="portal-btn portal-btn-private"
                  onclick="adminLaunchPrivate('https://admin.cloud.microsoft','inprivate')"
                  title="Copies URL — paste in Edge InPrivate (Ctrl+Shift+P)">InPrivate</button>
        </div>
      </div>

      <!-- Partner Center -->
      <div class="portals-group">
        <div class="portals-group-name">Partner Center</div>
        <div class="portals-buttons">
          <a class="portal-btn"
             href="https://partner.microsoft.com/dashboard/v2/home"
             target="_blank" rel="noopener">Chrome</a>
          <a class="portal-btn"
             href="microsoft-edge:https://partner.microsoft.com/dashboard/v2/home">Edge</a>
        </div>
      </div>

      <!-- M365 Lighthouse -->
      <div class="portals-group">
        <div class="portals-group-name">M365 Lighthouse</div>
        <div class="portals-buttons">
          <a class="portal-btn"
             href="https://lighthouse.microsoft.com"
             target="_blank" rel="noopener">Chrome</a>
          <a class="portal-btn"
             href="microsoft-edge:https://lighthouse.microsoft.com">Edge</a>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="admin-toast" class="admin-toast" role="status" aria-live="polite"></div>
<script src="/js/admin-links.js"></script>
