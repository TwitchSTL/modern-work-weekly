baseURL = "https://modernworkweekly.com"
languageCode = "en-us"
title = "Modern Work Weekly"

[params]
  author = "Ryan Arbuckle"
  description = "Weekly Microsoft 365 and Modern Work change digest for engineers, architects, and admins."
  subtitle = "by Ryan Arbuckle"
  github = "https://github.com/TwitchSTL"
  linkedin = "https://www.linkedin.com/in/ryanarbuckle/"
  keywords = ["Microsoft 365", "Intune", "Entra", "Defender", "Modern Work", "IT Admin"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    style = "github"
    lineNos = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2

[taxonomies]
  category = "categories"
  tag = "tags"

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 50
  [[related.indices]]
    name = "date"
    weight = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[params.rss]
  enabled = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Archive"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Exec Guide"
    url = "/exec/"
    weight = 3
  [[menu.main]]
    name = "Deadlines"
    url = "/deadlines/"
    weight = 4
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 5
