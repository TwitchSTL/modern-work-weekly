<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px; height: 627px;
    overflow: hidden;
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 80px;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(46,168,184,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,168,184,0.045) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .accent-bar {
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #2ea8b8 0%, #a78bfa 50%, #3fb950 100%);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 36px;
    position: relative;
  }
  .icon-wrap {
    width: 64px; height: 64px;
    background: rgba(46,168,184,0.12);
    border: 1px solid rgba(46,168,184,0.3);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .wordmark { display: flex; flex-direction: column; gap: 2px; }
  .wordmark-top {
    font-size: 20px; font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .wordmark-bottom {
    font-size: 30px; font-weight: 700;
    color: #ffffff; letter-spacing: -0.01em;
  }
  .headline {
    font-size: 46px; font-weight: 700;
    color: #ffffff; line-height: 1.15;
    margin-bottom: 20px; position: relative;
  }
  .headline em { font-style: normal; color: #2ea8b8; }
  .tagline {
    font-size: 20px; font-weight: 400;
    color: rgba(255,255,255,0.48);
    line-height: 1.5; position: relative;
  }
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 44px; position: relative;
  }
  .url {
    font-size: 15px; font-weight: 500;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.02em;
  }
  .chips { display: flex; gap: 8px; }
  .chip {
    font-size: 11px; font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid;
    letter-spacing: 0.03em;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>

  <div class="brand">
    <div class="icon-wrap">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <polyline points="2,18 8,18 11,8 15,28 19,12 23,22 26,18 34,18"
          stroke="#2ea8b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="wordmark">
      <span class="wordmark-top">Modern Work</span>
      <span class="wordmark-bottom">Weekly</span>
    </div>
  </div>

  <div class="headline">
    The Microsoft 365 digest for<br>
    <em>Modern Work Engineers</em>
  </div>
  <div class="tagline">Identity · Devices · Apps · Data · Network · Security — every Tuesday.</div>

  <div class="bottom-row">
    <span class="url">modernworkweekly.com</span>
    <div class="chips">
      <span class="chip" style="color:#a78bfa;border-color:#a78bfa">Entra</span>
      <span class="chip" style="color:#3fb950;border-color:#3fb950">Intune</span>
      <span class="chip" style="color:#58a6ff;border-color:#58a6ff">Teams</span>
      <span class="chip" style="color:#f0883e;border-color:#f0883e">Purview</span>
      <span class="chip" style="color:#d2a8ff;border-color:#d2a8ff">Defender</span>
    </div>
  </div>
</body>
</html>
